    // Auto-formatting helpers
    const cleanName = (str) => {
      if (!str) return '';
      return str.trim()
        .replace(/\s+/g, ' ')
        .split(/\s+/)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(' ');
    };

    const cleanSentence = (str) => {
      if (!str) return '';
      let trimmed = str.trim().replace(/\s+/g, ' ');
      if (trimmed.length === 0) return '';
      trimmed = trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
      if (!/[.!?]$/.test(trimmed)) {
        trimmed += '.';
      }
      return trimmed;
    };

    const cleanAddress = (str) => {
      if (!str) return '';
      return str.trim()
        .replace(/\s+/g, ' ')
        .split(/\s+/)
        .map(word => {
          if (/^apt\.?$/i.test(word)) return 'Apt';
          if (/^st\.?$/i.test(word)) return 'St';
          if (/^ave\.?$/i.test(word)) return 'Ave';
          if (/^rd\.?$/i.test(word)) return 'Rd';
          if (/^blvd\.?$/i.test(word)) return 'Blvd';
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        })
        .join(' ');
    };

      // 2. Auth Init and Listener (Safe Graceful Fallbacks)
      useEffect(() => {
        if (!auth) return;
        const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseHelper;

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {

                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenError) {

                } catch (anonError) {

            } else {

              } catch (anonError) {
                console.warn("Anonymous login disabled.", anonError);
              }
            }
          } catch (e) {

          }

          } else {

          }

      // 3. Fetch Data from Firestore (Guarded by user verification status check)

      // Error Code Decoder
      const getFriendlyErrorMessage = (error) => {
        const code = error.code || error.message || "";
        if (code.includes('api-key-not-valid') || code.includes('invalid-api-key')) {
          return "Settings Check Needed: The website's Database Key is incorrect or still being set up in Firebase.";
        }
        if (code.includes('auth/invalid-email') || code.includes('invalid-email')) {

        if (code.includes('auth/weak-password') || code.includes('weak-password')) {
          return "Password Too Short: Please create a password that is at least 6 characters long.";
        }
        if (code.includes('auth/email-already-in-use') || code.includes('email-already-in-use')) {
          return "Account Already Exists: An account with this email already exists! Try signing in instead.";
        }

            try {
              const actionCodeSettings = {
                url: window.location.href, // Auto redirects user back into this app layout
                handleCodeInApp: false     // Disable strict deep linking to ensure standard web execution
              };
              await sendEmailVerification(userCred.user, actionCodeSettings);
              setVerificationSent(true);
            } catch (linkError) {
              console.warn("Direct-redirect email format rejected, falling back to clean verification standard...", linkError);
              try {
                await sendEmailVerification(userCred.user);
                setVerificationSent(true);
              } catch (standardError) {
                console.error("All email send strategies failed:", standardError);
                throw standardError;
              }
            }

            // Track user profiles safely for system metrics
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'userProfiles', userCred.user.uid);
            await setDoc(userRef, { email: authEmail, createdAt: new Date().toISOString() });
          } else {
            const userCred = await signInWithEmailAndPassword(auth, authEmail, authPassword);
            if (!userCred.user.emailVerified) {
              setVerificationSent(true);
            }
          }
        } catch (error) {
          setAuthError(getFriendlyErrorMessage(error));

      };

      // === INTERVIEW LOGIC ===
      const resetForm = () => {
        setFormData({
          tenantName: '', rentalAddress: '', apartmentNum: '', city: '',
          landlordName: '', repairType: '', repairDescription: '', dateBegan: new Date().toISOString().split('T')[0],
          notifiedBefore: 'no', urgency: 'normal', children: 'no',
          photosData: []
        });
      };

      const handleStartNewRequest = () => {
        resetForm();
        setCurrentStep(1);
        setView('interview');
      };

      const handleInputChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
      };

      const steps = [
        { id: 1, title: { en: 'Profile & Location', es: 'Perfil y ubicación', 'zh-CN': '基本信息与地址', 'zh-TW': '基本信息與地址', vi: 'Hồ sơ & Địa điểm', tl: 'Profile at Lokasyon' } },
        { id: 2, title: { en: 'Select Repair Issue', es: 'Seleccionar problema', 'zh-CN': '选择受损类别', 'zh-TW': '選擇受損類別', vi: 'Chọn sự cố', tl: 'Pumili ng Isyu' } },
        { id: 3, title: { en: 'Repair Details', es: 'Detalles de la reparación', 'zh-CN': '具体受损详情', 'zh-TW': '具體受損詳情', vi: 'Chi tiết sửa chữa', tl: 'Mga Detalye ng Pag-aayos' } },
        { id: 4, title: { en: 'Landlord Info', es: 'Propietario', 'zh-CN': '房东联络信息', 'zh-TW': '房東聯絡信息', vi: 'Thông tin chủ nhà', tl: 'Impormasyon ng Landlord' } },
        { id: 5, title: { en: 'Urgency', es: 'Urgencia', 'zh-CN': '紧急程度评估', 'zh-TW': '緊急程度評估', vi: 'Mức độ khẩn cấp', tl: 'Urgensya' } },
        { id: 6, title: { en: 'Evidence & Photo Upload', es: 'Evidencia y Fotos', 'zh-CN': '上传现场照片', 'zh-TW': '上傳現場照片', vi: 'Bằng chứng & Tải ảnh', tl: 'Katibayan at Larawan' } }
      ];

      const handleNextStep = () => {
        if (currentStep < steps.length) {
          setCurrentStep(currentStep + 1);
        } else {
          generateRequestPacket();
        }
      };

      const handlePrevStep = () => {
        if (currentStep > 1) {
          setCurrentStep(currentStep - 1);
        }
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 600;
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scaleSize;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const base64String = canvas.toDataURL('image/jpeg', 0.6);
            
            setFormData(prev => ({
              ...prev,
              photosData: [...(prev.photosData || []), base64String]
            }));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const removePhoto = (index) => {
        setFormData(prev => {
          const newPhotos = [...prev.photosData];
          newPhotos.splice(index, 1);
          return { ...prev, photosData: newPhotos };
        });
      };

      const generateLocalTexts = (data, lang) => {
        const issueObj = REPAIR_TYPES.find(r => r.id === data.repairType);
        const issueLabel = issueObj ? (issueObj.label[lang] || issueObj.label['en']) : data.repairType;
        
        // Apply Auto formatting, font structure and punctuation checks
        const formattedTenantName = cleanName(data.tenantName);
        const formattedAddress = cleanAddress(data.rentalAddress);
        const formattedApt = data.apartmentNum ? data.apartmentNum.trim().toUpperCase() : '';
        const formattedCity = cleanName(data.city);
        const formattedLandlord = cleanName(data.landlordName);
        const formattedDesc = cleanSentence(data.repairDescription);

        const salutation = lang === 'en' ? `Dear ${formattedLandlord || 'Landlord'},` : `Estimado ${formattedLandlord || 'Propietario'},`;
        const opening = lang === 'en' 
          ? `I am writing to formally request repairs to my rental unit at ${formattedAddress} ${formattedApt ? 'Unit ' + formattedApt : ''}, located in ${formattedCity}.`
          : `Le escribo para solicitar formalmente reparaciones en mi unidad ubicada en ${formattedAddress} ${formattedApt ? 'Apt ' + formattedApt : ''}, en la ciudad de ${formattedCity}.`;
        const body = lang === 'en'
          ? `There is a habitability issue regarding: ${issueLabel}.\n\nDetails of the issue: ${formattedDesc}\n\nUnder California Civil Code Section 1941.1, landlords are legally required to maintain premises in a safe and tenantable condition fit for human occupation.`
          : `Existe un problema de habitabilidad de: ${issueLabel}.\n\nDetalles del problema: ${formattedDesc}\n\nSegún la sección 1941.1 del Código Civil de California, los propietarios están obligados por ley a mantener las instalaciones en condiciones habitables.`;
        const urgencySection = data.urgency === 'emergency' 
          ? (lang === 'en' ? `As this is an active emergency, please coordinate with a professional immediately to address this within 24 hours.` : `Dado que se trata de una emergencia activa, coordine con un profesional de inmediato para resolver esto dentro de las próximas 24 horas.`)
          : (lang === 'en' ? `Please contact me immediately to schedule a mutually convenient repair date.` : `Comuníquese conmigo de inmediato para programar una fecha de reparación conveniente.`);
        const closing = lang === 'en' ? `Sincerely,\n\n${formattedTenantName}` : `Atentamente,\n\n${formattedTenantName}`;

        const letterText = `${new Date().toLocaleDateString(lang === 'en' ? 'en-US' : 'es-ES')}\n\n${salutation}\n\n${opening}\n\n${body}\n\n${urgencySection}\n\n${closing}`;
        const emailText = `Subject: Repair Request - ${issueLabel} - Apt ${formattedApt}\n\n${salutation}\n\n${opening}\n\n${body}\n\n${urgencySection}\n\n${closing}`;
        const smsText = lang === 'en' 
          ? `Hi ${formattedLandlord || 'Landlord'}, this is ${formattedTenantName} at Apt ${formattedApt}. I'm texting to request urgent repair for ${issueLabel}. Please let me know when a repair person can come.`
          : `Hola ${formattedLandlord || 'Propietario'}, soy ${formattedTenantName} del Apt ${formattedApt}. Escribo para solicitar reparación de ${issueLabel}. Avíseme cuándo puede venir alguien.`;

        return { letterText, emailText, smsText };
      };

      const generateRequestPacket = async () => {
        setLoading(true);
        setView('result');

        const fallback = generateLocalTexts(formData, language);
        
        const newRequest = {
          id: 'req-' + Date.now(),
          ...formData,
          tenantName: cleanName(formData.tenantName),
          rentalAddress: cleanAddress(formData.rentalAddress),
          city: cleanName(formData.city),
          landlordName: cleanName(formData.landlordName),
          repairDescription: cleanSentence(formData.repairDescription),
          status: 'Submitted',
          createdAt: new Date().toISOString(),
          letterText: fallback.letterText,
          emailText: fallback.emailText,
          smsText: fallback.smsText
        };

        const { doc, setDoc } = window.FirebaseHelper;
        try {
          if (db && appUser) {
            await setDoc(doc(db, 'artifacts', appId, 'users', appUser.uid, 'requests', newRequest.id), newRequest);
          }
          setSelectedRequest(newRequest);
        } catch (error) {
          console.error("Error saving request to Firestore:", error);
          setSelectedRequest(newRequest); 
          alert("Could not save to cloud database, but your letters were successfully generated and are shown below!");
        }
        
        setLoading(false);
        setView('dashboard'); 
      };

      const handleDeleteRequest = async (id, e) => {
        e.stopPropagation();
        const { doc, deleteDoc } = window.FirebaseHelper;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', appUser.uid, 'requests', id));
          if (selectedRequest?.id === id) setSelectedRequest(null);
        } catch (error) {
          console.error("Error deleting request:", error);
        }
      };

      const copyToClipboard = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); alert('Copied to clipboard!'); } catch (err) {}
        document.body.removeChild(textArea);
      };

      if (!authInitialized) {
        return <div className="min-h-screen flex items-center justify-center text-teal-600 font-bold">Connecting securely...</div>;
      }

      // === AUTH: STRICT VERIFICATION OR CHECKPOINT SCREEN ===
      if (appUser && !appUser.emailVerified && !appUser.isAnonymous) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 animate-fadeIn">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center px-4">
              <div className="inline-flex p-3 bg-amber-100 rounded-2xl text-amber-700 shadow-md mx-auto">
                <AlertTriangle className="w-8 h-8 text-amber-600" />
              </div>
              <h2 className="mt-4 text-3xl font-extrabold text-slate-900">Email Verification Required</h2>
              <p className="mt-2 text-sm text-slate-600">
                You must verify your email address before using LawLens. We sent a secure verification link to:
              </p>
              <p className="font-extrabold text-teal-700 mt-1">{appUser.email}</p>
              
              <div className="mt-8 space-y-4 max-w-sm mx-auto">
                <button 
                  onClick={checkVerificationStatus} 
                  disabled={checkLoading}
                  className="w-full inline-flex items-center justify-center gap-2 px-4 py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl shadow-sm text-sm transition"
                >
                  <RefreshCw /> {checkLoading ? "Checking..." : "I Verified My Email"}
                </button>
                <button onClick={resendVerification} className="w-full inline-flex justify-center px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl text-sm transition">
                  Resend Verification Email
                </button>
                <button onClick={handleLogout} className="w-full inline-flex justify-center px-4 py-3 bg-rose-50 hover:bg-rose-100 text-rose-700 font-bold rounded-xl text-sm transition">
                  Log Out / Switch Account
                </button>
              </div>
            </div>
          </div>
        );
      }

      // === RENDER LOGIN/SIGNUP UI ===
      if (!appUser) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
              <div className="inline-flex p-3 bg-gradient-to-tr from-teal-600 to-emerald-500 rounded-2xl text-white shadow-md mx-auto">
                <ShieldAlert />
              </div>
              <h2 className="mt-4 text-3xl font-extrabold text-slate-900">LawLens</h2>
              <p className="mt-2 text-sm text-slate-600">{t.subtitle}</p>
            </div>

            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-slate-200">
                <form className="space-y-6" onSubmit={handleAuthSubmit}>
                  {authError && (
                    <div className="p-3 bg-rose-50 border border-rose-200 text-rose-700 text-xs rounded-xl font-semibold leading-relaxed">
                      {authError}
                    </div>
                  )}
                  <div>
                    <label className="block text-sm font-medium text-slate-700">Email address</label>
                    <input type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} className="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 focus:bg-white text-slate-800 font-medium transition" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700">Password</label>
                    <input type="password" required value={authPassword} onChange={e => setAuthPassword(e.target.value)} className="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 focus:bg-white text-slate-800 font-medium transition" />
                  </div>
                  <button type="submit" disabled={authLoading} className="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 transition">
                    {authLoading ? 'Processing...' : (authMode === 'login' ? 'Sign In to Account' : 'Create Free Account')}
                  </button>
                </form>
                <div className="mt-6 text-center">
                  <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="text-teal-600 font-bold text-sm hover:text-teal-500 transition">
                    {authMode === 'login' ? 'Need an account? Sign up' : 'Already have an account? Sign in'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // === RENDER MAIN APP ===
      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased">
          
          <header className="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm backdrop-blur-md bg-white/95 no-print">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('dashboard')}>
                <div className="p-2 bg-gradient-to-tr from-teal-600 to-emerald-500 rounded-xl text-white shadow-md">
                  <ShieldAlert />
                </div>
                <h1 className="text-xl font-black tracking-tight text-slate-800 flex items-center gap-1">
                  Law<span className="text-teal-600">Lens</span>
                </h1>
              </div>

              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                  <Languages />
                  <select value={language} onChange={(e) => setLanguage(e.target.value)} className="bg-transparent text-sm font-semibold text-slate-700 focus:outline-none cursor-pointer pr-1">
                    {LANGUAGES.map(lang => (<option key={lang.code} value={lang.code}>{lang.label}</option>))}
                  </select>
                </div>
                <button onClick={handleLogout} className="flex items-center gap-1 px-3 py-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg text-sm font-bold transition">
                  <LogOut /> Exit
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 no-print">
            
            {/* Safe Educational Instructions Guide Box */}
            <div className="mb-6 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
              <h3 className="font-extrabold text-slate-800 text-base mb-3 flex items-center gap-2">
                <Info /> {t.instructionsTitle}
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {t.instructionSteps.map((stepText, idx) => (
                  <div key={idx} className="flex items-start gap-3 bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                    <span className="flex items-center justify-center w-6 h-6 bg-teal-100 text-teal-800 text-xs font-bold rounded-full shrink-0">
                      {idx + 1}
                    </span>
                    <p className="text-xs text-slate-600 leading-relaxed font-medium">{stepText}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* DASHBOARD VIEW */}
            {view === 'dashboard' && (
              <div className="space-y-8 animate-fadeIn">
                <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-teal-950 rounded-2xl p-6 sm:p-8 text-white shadow-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                  <div className="space-y-2 max-w-xl">
                    <div className="inline-flex items-center gap-1 px-3 py-1 bg-teal-500/20 border border-teal-500/30 rounded-full text-teal-300 text-xs font-bold">
                      <Sparkles /> Smart Tenant Toolkit
                    </div>
                    <h2 className="text-2xl sm:text-3.5xl font-extrabold tracking-tight">Protect Your Home. Enforce Your Rights.</h2>
                  </div>
                  <button onClick={handleStartNewRequest} className="shrink-0 flex items-center gap-2 px-6 py-4 bg-teal-500 hover:bg-teal-400 text-slate-900 font-extrabold text-lg rounded-2xl shadow-lg transition transform active:scale-95">
                    <Plus /> {t.newRequest}
                  </button>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  
                  {/* History Column */}
                  <div className="lg:col-span-1 space-y-4">
                    <h3 className="font-bold text-slate-700 text-lg border-b border-slate-200 pb-2">{t.savedRequests}</h3>
                    <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                      {requests.length === 0 ? (
                        <p className="text-sm text-slate-500 text-center py-6 bg-white rounded-xl border border-dashed border-slate-300">No requests saved yet. Click "New Request" to begin.</p>
                      ) : requests.map(req => {
                        const iconObj = REPAIR_TYPES.find(r => r.id === req.repairType);
                        return (
                          <div key={req.id} onClick={() => setSelectedRequest(req)} className={`p-4 rounded-xl border transition cursor-pointer flex justify-between items-start ${selectedRequest?.id === req.id ? 'bg-teal-50/50 border-teal-500 shadow-sm' : 'bg-white border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}>
                            <div className="flex items-center gap-3">
                              <span className="text-2xl">{iconObj?.icon || '🛠️'}</span>
                              <div>
                                <h4 className="font-bold text-slate-800 text-sm">{iconObj?.label?.[language] || req.repairType}</h4>
                                <p className="text-xs text-slate-500">{new Date(req.createdAt).toLocaleDateString()}</p>
                              </div>
                            </div>
                            <button onClick={(e) => handleDeleteRequest(req.id, e)} className="p-1.5 hover:bg-rose-50 text-slate-400 hover:text-rose-600 rounded-lg transition"><Trash2 /></button>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Document View Column */}
                  <div className="lg:col-span-2">
                    {selectedRequest ? (
                      <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 space-y-6">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-100 pb-4">
                          <h3 className="text-xl font-bold text-slate-800">
                            {REPAIR_TYPES.find(r => r.id === selectedRequest.repairType)?.label?.[language] || selectedRequest.repairType} Request
                          </h3>
                          
                          {/* Print to PDF Action Button */}
                          <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold rounded-lg transition">
                            <Printer /> Print / Save as PDF
                          </button>
                        </div>

                        {/* Display uploaded photos if any exist in the record */}
                        {selectedRequest.photosData && selectedRequest.photosData.length > 0 && (
                          <div className="p-4 bg-slate-50 rounded-xl border border-slate-200">
                            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Attached Evidence Photos</h4>
                            <div className="flex gap-3 overflow-x-auto pb-2">
                              {selectedRequest.photosData.map((b64, idx) => (
                                <img key={idx} src={b64} alt="Evidence" className="h-24 w-24 object-cover rounded-lg border border-slate-300 shadow-sm" />
                              ))}
                            </div>
                          </div>
                        )}

                        <div>
                          <div className="flex border-b border-slate-200">
                            <button onClick={() => setActiveOutputTab('letter')} className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'letter' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}>
                              <FileText className="w-4 h-4" /> Formal Letter
                            </button>
                            <button onClick={() => setActiveOutputTab('email')} className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'email' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}>
                              <Mail /> Email Draft
                            </button>
                            <button onClick={() => setActiveOutputTab('sms')} className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'sms' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}>
                              <MessageSquare /> SMS Text
                            </button>
                          </div>
                          
                          <div className="mt-4 p-5 bg-slate-50 border border-slate-200 rounded-xl relative">
                            <button onClick={() => copyToClipboard(activeOutputTab === 'letter' ? (selectedRequest.letterText || '') : activeOutputTab === 'email' ? (selectedRequest.emailText || '') : (selectedRequest.smsText || ''))} className="absolute top-3 right-3 p-2 bg-white hover:bg-slate-100 text-slate-500 rounded-lg border border-slate-200 shadow-sm transition flex items-center gap-1 text-xs">
                              <Copy /> Copy Text
                            </button>
                            
                            <pre className="whitespace-pre-wrap font-sans text-sm text-slate-700 leading-relaxed max-h-[400px] overflow-y-auto">
                              {activeOutputTab === 'letter' && (selectedRequest.letterText || '')}
                              {activeOutputTab === 'email' && (selectedRequest.emailText || '')}
                              {activeOutputTab === 'sms' && (selectedRequest.smsText || '')}
                            </pre>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="bg-slate-100/50 border-2 border-dashed border-slate-300 rounded-2xl p-12 text-center space-y-4">
                        <FileText className="w-12 h-12 text-slate-400 mx-auto" />
                        <h4 className="font-bold text-slate-700">Select a request from your history to view it.</h4>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* INTERVIEW WIZARD VIEW */}
            {view === 'interview' && (
              <div className="max-w-3xl mx-auto bg-white border border-slate-200 rounded-3xl shadow-xl overflow-hidden animate-fadeIn">
                <div className="bg-gradient-to-r from-slate-900 to-slate-800 px-6 sm:px-8 py-5 text-white flex justify-between items-center">
                  <div>
                    <span className="text-xs uppercase tracking-widest text-teal-400 font-bold">{t.step} {currentStep} {t.of} {steps.length}</span>
                    <h3 className="text-lg font-bold">{steps[currentStep-1].title[language]}</h3>
                  </div>
                  <button onClick={() => setView('dashboard')} className="text-slate-400 hover:text-white text-xs font-semibold">Cancel</button>
                </div>
                <div className="w-full h-1.5 bg-slate-100">
                  <div className="h-full bg-teal-500 transition-all duration-300" style={{ width: `${(currentStep / steps.length) * 100}%` }}></div>
                </div>

                <div className="p-6 sm:p-8 space-y-6">
                  {currentStep === 1 && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5"><UserIcon /> Tenant Name</label>
                        <input type="text" value={formData.tenantName || ''} onChange={e => handleInputChange('tenantName', e.target.value)} placeholder="e.g. jane doe" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5"><HomeIcon /> Street Address</label>
                        <input type="text" value={formData.rentalAddress || ''} onChange={e => handleInputChange('rentalAddress', e.target.value)} placeholder="e.g. 123 mission st" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-700">Apt / Unit Number</label>
                        <input type="text" value={formData.apartmentNum || ''} onChange={e => handleInputChange('apartmentNum', e.target.value)} placeholder="Apt 4B" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-700">City</label>
                        <input type="text" value={formData.city || ''} onChange={e => handleInputChange('city', e.target.value)} placeholder="e.g. san francisco" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500" />
                      </div>
                    </div>
                  )}

                  {currentStep === 2 && (
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                      {REPAIR_TYPES.map(repair => (
                        <div key={repair.id} onClick={() => handleInputChange('repairType', repair.id)} className={`p-4 rounded-xl border text-center cursor-pointer transition flex flex-col items-center justify-center gap-2 ${formData.repairType === repair.id ? 'bg-teal-50 border-teal-500 ring-2 ring-teal-500/25' : 'bg-slate-50'}`}>
                          <span className="text-3xl">{repair.icon}</span>
                          <span className="text-xs font-bold">{repair.label[language] || repair.label['en']}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {currentStep === 3 && (
                    <div className="space-y-4">
                      <label className="text-sm font-bold text-slate-700">Describe the problem exactly as you see it:</label>
                      <textarea rows={4} value={formData.repairDescription || ''} onChange={e => handleInputChange('repairDescription', e.target.value)} placeholder="E.g. the shower handle broke off and won't turn on..." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500"></textarea>
                    </div>
                  )}

                  {currentStep === 4 && (
                    <div className="space-y-4">
                      <label className="text-sm font-bold text-slate-700">Landlord / Property Manager Name</label>
                      <input type="text" value={formData.landlordName || ''} onChange={e => handleInputChange('landlordName', e.target.value)} placeholder="e.g. jane management" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500" />
                    </div>
                  )}

                  {currentStep === 5 && (
                    <div className="space-y-4">
                      <label className="text-sm font-bold text-slate-700 block">How urgent is this repair?</label>
                      <div onClick={() => handleInputChange('urgency', 'emergency')} className={`p-4 rounded-xl border cursor-pointer flex items-center gap-3 ${formData.urgency === 'emergency' ? 'bg-rose-50 border-rose-500 ring-2 ring-rose-500/25' : 'bg-slate-50'}`}>
                        <AlertTriangle />
                        <div><p className="text-sm font-bold text-slate-800">Immediate Emergency</p><p className="text-xs text-slate-500">Major leaks, no heat, severe mold.</p></div>
                      </div>
                      <div onClick={() => handleInputChange('urgency', 'normal')} className={`p-4 rounded-xl border cursor-pointer flex items-center gap-3 ${formData.urgency === 'normal' ? 'bg-teal-50 border-teal-500 ring-2 ring-teal-500/25' : 'bg-slate-50'}`}>
                        <Wrench />
                        <div><p className="text-sm font-bold text-slate-800">Normal Priority</p><p className="text-xs text-slate-500">Inconvenient but structurally safe.</p></div>
                      </div>
                    </div>
                  )}

                  {currentStep === 6 && (
                    <div className="space-y-6">
                      <div className="p-5 bg-slate-50 border border-slate-200 rounded-xl space-y-4">
                        <h4 className="font-bold text-slate-800 text-sm">Upload Photographic Evidence</h4>
                        <p className="text-xs text-slate-500 leading-relaxed">Adding photos makes your repair request much stronger. Take clear, well-lit photos of the problem area.</p>
                        
                        <input type="file" id="photo-upload" accept="image/*" onChange={handlePhotoUpload} className="hidden" />
                        
                        <label htmlFor="photo-upload" className="cursor-pointer inline-flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 bg-white border-2 border-dashed border-teal-500 text-teal-700 font-bold rounded-xl hover:bg-teal-50 transition shadow-sm">
                          <Camera /> Add a Photo
                        </label>

                        {/* Photo Preview Gallery */}
                        {formData.photosData && formData.photosData.length > 0 && (
                          <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 pt-4 border-t border-slate-200 mt-4">
                            {formData.photosData.map((b64, index) => (
                              <div key={index} className="relative group aspect-square">
                                <img src={b64} alt={`Uploaded ${index+1}`} className="w-full h-full object-cover rounded-lg border border-slate-300 shadow-sm" />
                                <button onClick={() => removePhoto(index)} className="absolute -top-2 -right-2 bg-rose-500 rounded-full p-1 shadow-md hover:bg-rose-600 transition" title="Remove Photo">
                                  <XCircle />
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-slate-50 border-t border-slate-100 px-6 sm:px-8 py-5 flex justify-between items-center">
                  <button onClick={handlePrevStep} disabled={currentStep === 1} className="flex items-center gap-1 px-4 py-2 text-sm font-bold rounded-xl text-slate-600 hover:bg-slate-200 disabled:opacity-30 disabled:cursor-not-allowed">
                    <ChevronLeft /> {t.back}
                  </button>
                  <button onClick={handleNextStep} className="flex items-center gap-1 px-6 py-3 bg-teal-600 hover:bg-teal-500 text-white font-bold text-sm rounded-xl shadow-md transition">
                    {currentStep === steps.length ? t.saveGenerate : t.next} <ChevronRight />
                  </button>
                </div>
              </div>
            )}
            
            {view === 'result' && loading && (
              <div className="text-center py-20"><h3 className="text-xl font-bold text-slate-800">Saving securely...</h3></div>
            )}
          </main>

          {/* INVISIBLE PRINT AREA FOR PDF COMPILATION (Activated only during print jobs) */}
          {selectedRequest && (
            <div id="printable-letter" className="hidden print:block p-10 bg-white leading-relaxed text-slate-900 text-sm">
              <div className="whitespace-pre-wrap font-serif text-slate-900 leading-relaxed text-sm">
                {selectedRequest.letterText || ''}
              </div>
              {selectedRequest.photosData && selectedRequest.photosData.length > 0 && (
                <div className="mt-12 pt-8 border-t border-slate-200 print-no-break">
                  <h4 className="font-bold text-slate-800 text-base mb-4">Attached Evidence Photos</h4>
                  <div className="grid grid-cols-2 gap-4">
                    {selectedRequest.photosData.map((b64, idx) => (
                      <div key={idx} className="border border-slate-300 p-2 rounded-lg">
                        <img src={b64} alt="Evidence" className="w-full h-auto object-contain rounded animate-fadeIn" />
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // Mount App once we detect FirebaseHelper is ready
    const mountInterval = setInterval(() => {
      if (window.FirebaseHelper) {
        clearInterval(mountInterval);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      }
    }, 50);
  </script>
</body>
</html>
