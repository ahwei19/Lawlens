                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  <div className="lg:col-span-1 space-y-4">
                    <div className="flex items-center justify-between border-b border-slate-200 pb-2">
                      <h3 className="font-bold text-slate-700 text-lg flex items-center gap-2">
                        <FileText />
                        {t.savedRequests}
                      </h3>
                    </div>

                    <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                      {requests.map(req => {
                        const iconObj = REPAIR_TYPES.find(r => r.id === req.repairType);
                        return (
                          <div 
                            key={req.id}
                            onClick={() => setSelectedRequest(req)}
                            className={`p-4 rounded-xl border transition cursor-pointer flex justify-between items-start ${
                              selectedRequest?.id === req.id 
                                ? 'bg-teal-50/50 border-teal-500 shadow-sm' 
                                : 'bg-white border-slate-200 hover:border-slate-300 hover:shadow-sm'
                            }`}
                          >
                            <div className="space-y-2">
                              <div className="flex items-center gap-2">
                                <span className="text-xl">{iconObj?.icon || '🛠️'}</span>
                                <div>
                                  <h4 className="font-bold text-slate-800 text-sm">
                                    {iconObj?.label[language] || req.repairType}
                                  </h4>
                                </div>
                              </div>
                              <div className="flex items-center gap-2">
                                {getStatusBadge(req.status)}
                              </div>
                            </div>
                            <button 
                              onClick={(e) => handleDeleteRequest(req.id, e)}
                              className="p-1.5 hover:bg-rose-50 text-slate-400 hover:text-rose-600 rounded-lg transition"
                            >
                              <Trash2 />
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div className="lg:col-span-2 space-y-6">
                    {selectedRequest ? (
                      <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 space-y-6">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-100 pb-4">
                          <div>
                            <div className="flex items-center gap-2">
                              <h3 className="text-xl font-bold text-slate-800">
                                {REPAIR_TYPES.find(r => r.id === selectedRequest.repairType)?.label[language] || selectedRequest.repairType} Request
                              </h3>
                              {getStatusBadge(selectedRequest.status)}
                            </div>
                          </div>
                          <button 
                            onClick={() => window.print()}
                            className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition"
                          >
                            <Printer /> {t.print}
                          </button>
                        </div>

                        <div>
                          <div className="flex border-b border-slate-200">
                            <button 
                              onClick={() => setActiveOutputTab('letter')}
                              className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'letter' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}
                            >
                              <FileText className="w-4 h-4" /> {t.outputTabs.letter}
                            </button>
                            <button 
                              onClick={() => setActiveOutputTab('email')}
                              className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'email' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}
                            >
                              <Mail /> {t.outputTabs.email}
                            </button>
                            <button 
                              onClick={() => setActiveOutputTab('sms')}
                              className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'sms' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}
                            >
                              <MessageSquare /> {t.outputTabs.sms}
                            </button>
                          </div>

                          <div className="mt-4 p-5 bg-slate-50 border border-slate-200 rounded-xl relative">
                            <button 
                              onClick={() => copyToClipboard(activeOutputTab === 'letter' ? selectedRequest.letterText : activeOutputTab === 'email' ? selectedRequest.emailText : selectedRequest.smsText)}
                              className="absolute top-3 right-3 p-2 bg-white hover:bg-slate-100 text-slate-500 rounded-lg border border-slate-200 shadow-sm transition flex items-center gap-1 text-xs"
                            >
                              <Copy /> Copy Text
                            </button>
                            <pre className="whitespace-pre-wrap font-sans text-sm text-slate-700 leading-relaxed max-h-[400px] overflow-y-auto">
                              {activeOutputTab === 'letter' && selectedRequest.letterText}
                              {activeOutputTab === 'email' && selectedRequest.emailText}
                              {activeOutputTab === 'sms' && selectedRequest.smsText}
                            </pre>
                          </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100">
                          <div className="space-y-3">
                            <h4 className="font-bold text-slate-800 flex items-center gap-1.5 text-sm">
                              <CheckSquare /> {t.evidenceTitle}
                            </h4>
                          </div>
                          <div className="space-y-3">
                            <h4 className="font-bold text-slate-800 flex items-center gap-1.5 text-sm">
                              <Clock /> {t.followUpTitle}
                            </h4>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="bg-slate-100/50 border-2 border-dashed border-slate-300 rounded-2xl p-12 text-center space-y-4">
                        <FileText className="w-12 h-12 text-slate-400 mx-auto" />
                        <div>
                          <h4 className="font-bold text-slate-700">No Request Selected</h4>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                <div className="bg-slate-100 rounded-2xl p-6 border border-slate-200 mt-12 space-y-6">
                  <div>
                    <h3 className="font-extrabold text-slate-800 text-xl flex items-center gap-2">
                      <Layers /> {t.futureToolsTitle}
                    </h3>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    {t.futureTools.map((tool, idx) => (
                      <div key={idx} className="bg-white p-5 rounded-xl border border-slate-200 flex flex-col justify-between opacity-80 cursor-not-allowed">
                        <div className="space-y-2">
                          <h4 className="font-bold text-slate-800 text-sm">{tool.title}</h4>
                          <p className="text-xs text-slate-500">{tool.desc}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {view === 'interview' && (
              <div className="max-w-3xl mx-auto bg-white border border-slate-200 rounded-3xl shadow-xl overflow-hidden">
                <div className="bg-gradient-to-r from-slate-900 to-slate-800 px-6 sm:px-8 py-5 text-white flex justify-between items-center">
                  <div>
                    <span className="text-xs uppercase tracking-widest text-teal-400 font-bold">
                      {t.step} {currentStep} {t.of} {steps.length}
                    </span>
                    <h3 className="text-lg font-bold">
                      {steps[currentStep-1].title[language]}
                    </h3>
                  </div>
                </div>

                <div className="w-full h-1.5 bg-slate-100">
                  <div className="h-full bg-teal-500 transition-all duration-300" style={{ width: `${(currentStep / steps.length) * 100}%` }}></div>
                </div>

                <div className="p-6 sm:p-8 space-y-6">
                  {currentStep === 1 && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div className="space-y-1.5">
                          <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
                            <User /> Full Tenant Name
                          </label>
                          <input 
                            type="text" 
                            value={formData.tenantName}
                            onChange={(e) => handleInputChange('tenantName', e.target.value)}
                            placeholder="John Doe" 
                            className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl"
                          />
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
                            <Home /> Rental Street Address
                          </label>
                          <input 
                            type="text" 
                            value={formData.rentalAddress}
                            onChange={(e) => handleInputChange('rentalAddress', e.target.value)}
                            placeholder="123 Mission St" 
                            className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl"
                          />
                        </div>
                      </div>
                    </div>
                  )}

                  {currentStep === 2 && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        {REPAIR_TYPES.map(repair => (
                          <div 
                            key={repair.id}
                            onClick={() => handleInputChange('repairType', repair.id)}
                            className={`p-4 rounded-xl border text-center cursor-pointer transition flex flex-col items-center justify-center gap-2 ${formData.repairType === repair.id ? 'bg-teal-50 border-teal-500' : 'bg-slate-50'}`}
                          >
                            <span className="text-3xl">{repair.icon}</span>
                            <span className="text-xs font-bold">{repair.label[language]}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {currentStep === 3 && (
                    <div className="space-y-6">
                      <textarea 
                        rows={4}
                        value={formData.repairDescription}
                        onChange={(e) => handleInputChange('repairDescription', e.target.value)}
                        placeholder="Describe the problem..."
                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl"
                      ></textarea>
                    </div>
                  )}

                  {currentStep === 4 && (
                    <div className="space-y-6">
                      <input 
                        type="text" 
                        value={formData.landlordName}
                        onChange={(e) => handleInputChange('landlordName', e.target.value)}
                        placeholder="Landlord Name" 
                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl"
                      />
                    </div>
                  )}

                  {currentStep === 5 && (
                    <div className="space-y-6">
                      <div 
                        onClick={() => handleInputChange('urgency', 'normal')}
                        className={`p-4 rounded-xl border cursor-pointer ${formData.urgency === 'normal' ? 'bg-teal-50 border-teal-500' : 'bg-slate-50'}`}
                      >
                        Normal Urgency
                      </div>
                    </div>
                  )}

                  {currentStep === 6 && (
                    <div className="space-y-6">
                      <div 
                        onClick={() => handleInputChange('selectedTone', 'professional')}
                        className="p-3 bg-teal-50 rounded-xl border border-teal-500 text-center cursor-pointer"
                      >
                        Tone: Professional Request
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-slate-50 border-t border-slate-100 px-6 sm:px-8 py-5 flex justify-between items-center">
                  <button 
                    onClick={handlePrevStep}
                    disabled={currentStep === 1}
                    className="flex items-center gap-1 px-4 py-2 text-sm font-bold rounded-xl"
                  >
                    <ChevronLeft /> {t.back}
                  </button>

                  <button 
                    onClick={handleNextStep}
                    className="flex items-center gap-1 px-6 py-3 bg-teal-600 hover:bg-teal-500 text-white font-bold text-sm rounded-xl"
                  >
                    {currentStep === steps.length ? t.generate : t.next}
                    <ChevronRight />
                  </button>
                </div>
              </div>
            )}
          </main>

          <footer className="border-t border-slate-200 bg-white mt-20 py-10 text-slate-500 text-xs text-center">
            <div className="max-w-7xl mx-auto px-4">
              <p>© 2026 LawLens Housing Rights Coalition. Built with clean, age-appropriate educational guidelines.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
