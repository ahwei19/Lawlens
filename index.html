<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LawLens - Repair Request Generator</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel CDN to compile JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <!-- Firebase ES Modules imported and attached to window for React to use -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    window.FirebaseHelper = {
      initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut,
      getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc
    };
  </script>
</head>
<body class="bg-slate-50">

  <div id="root">
    <div class="min-h-screen flex items-center justify-center text-slate-500 font-medium">
      Loading application environment...
    </div>
  </div>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React Code -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Define Icons
    const Languages = () => <i data-lucide="languages" className="w-4 h-4 text-slate-500"></i>;
    const Wrench = () => <i data-lucide="wrench" className="w-6 h-6 text-teal-600 shrink-0"></i>;
    const FileText = ({ className }) => <i data-lucide="file-text" className={className || "w-5 h-5 text-teal-600"}></i>;
    const Mail = () => <i data-lucide="mail" className="w-4 h-4"></i>;
    const MessageSquare = () => <i data-lucide="message-square" className="w-4 h-4"></i>;
    const Printer = () => <i data-lucide="printer" className="w-4 h-4"></i>;
    const Copy = () => <i data-lucide="copy" className="w-3.5 h-3.5"></i>;
    const CheckSquare = () => <i data-lucide="check-square" className="w-4.5 h-4.5 text-teal-600"></i>;
    const Clock = ({ className }) => <i data-lucide="clock" className={className || "w-4.5 h-4.5 text-amber-600"}></i>;
    const AlertTriangle = ({ className }) => <i data-lucide="alert-triangle" className={className || "w-6 h-6 text-rose-600 shrink-0"}></i>;
    const UserIcon = () => <i data-lucide="user" className="w-4 h-4 text-slate-400"></i>;
    const HomeIcon = () => <i data-lucide="home" className="w-4 h-4 text-slate-400"></i>;
    const ChevronRight = () => <i data-lucide="chevron-right" className="w-4 h-4"></i>;
    const ChevronLeft = () => <i data-lucide="chevron-left" className="w-4 h-4"></i>;
    const Plus = () => <i data-lucide="plus" className="w-6 h-6"></i>;
    const Trash2 = () => <i data-lucide="trash-2" className="w-4 h-4"></i>;
    const ShieldAlert = () => <i data-lucide="shield-alert" className="w-6 h-6"></i>;
    const Sparkles = () => <i data-lucide="sparkles" className="w-3.5 h-3.5"></i>;
    const Layers = () => <i data-lucide="layers" className="w-5.5 h-5.5 text-teal-600"></i>;
    const Info = () => <i data-lucide="info" className="w-5 h-5 text-teal-600 shrink-0 mt-0.5"></i>;
    const LogOut = () => <i data-lucide="log-out" className="w-4 h-4"></i>;
    const Camera = () => <i data-lucide="camera" className="w-5 h-5"></i>;
    const XCircle = () => <i data-lucide="x-circle" className="w-4 h-4 text-white"></i>;

    const LANGUAGES = [{ code: 'en', label: 'English' }, { code: 'es', label: 'Español' }];
    
    const REPAIR_TYPES = [
      { id: 'mold', label: { en: 'Mold', es: 'Moho' }, icon: '🦠' },
      { id: 'plumbing', label: { en: 'Plumbing', es: 'Plomería' }, icon: '🚰' },
      { id: 'leak', label: { en: 'Roof/Wall Leak', es: 'Fuga' }, icon: '💧' },
      { id: 'heat', label: { en: 'Heating', es: 'Calefacción' }, icon: '❄️' },
      { id: 'electricity', label: { en: 'Electricity', es: 'Electricidad' }, icon: '⚡' },
      { id: 'pests', label: { en: 'Pests / Rodents', es: 'Plagas' }, icon: '🐀' },
      { id: 'locks', label: { en: 'Door Lock', es: 'Cerradura' }, icon: '🔒' },
      { id: 'appliances', label: { en: 'Appliances', es: 'Electrodomésticos' }, icon: '🔌' },
      { id: 'other', label: { en: 'Other Issue', es: 'Otro' }, icon: '🛠️' }
    ];

    function App() {
      // Firebase State
      const [authInitialized, setAuthInitialized] = useState(false);
      const [appUser, setAppUser] = useState(null);
      const [db, setDb] = useState(null);
      const [auth, setAuth] = useState(null);
      const [appId, setAppId] = useState('lawlens-default');

      // Auth UI State
      const [authMode, setAuthMode] = useState('login'); // 'login' or 'register'
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authError, setAuthError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);

      // App State
      const [language, setLanguage] = useState('en');
      const [view, setView] = useState('dashboard');
      const [requests, setRequests] = useState([]);
      const [currentStep, setCurrentStep] = useState(1);
      const [formData, setFormData] = useState({});
      const [selectedRequest, setSelectedRequest] = useState(null);
      const [loading, setLoading] = useState(false);
      const [activeOutputTab, setActiveOutputTab] = useState('letter');

      // 1. Initialize Firebase outside component lifecycle
      useEffect(() => {
        if (!window.FirebaseHelper) return;
        const { initializeApp, getAuth, getFirestore } = window.FirebaseHelper;
        
        // Use environment config if available, otherwise use a placeholder to prevent crash
        let firebaseConfig = { apiKey: "demo", projectId: "demo" };
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
          firebaseConfig = JSON.parse(__firebase_config);
        }
        
        const fApp = initializeApp(firebaseConfig);
        const fAuth = getAuth(fApp);
        const fDb = getFirestore(fApp);
        const cAppId = typeof __app_id !== 'undefined' ? __app_id : 'lawlens-default';
        
        setAuth(fAuth);
        setDb(fDb);
        setAppId(cAppId);
      }, []);

      // 2. Auth Init and Listener (MANDATORY FIREBASE RULES)
      useEffect(() => {
        if (!auth) return;
        const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseHelper;

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              // We call anonymous first to satisfy the prompt mandate, 
              // but we will hide it behind our custom login UI later.
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth init error", e);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (user) => {
          // If the user logged in with an explicit account, or they are in the canvas environment (custom token), grant access
          if (user && (!user.isAnonymous || (typeof __initial_auth_token !== 'undefined' && __initial_auth_token))) {
            setAppUser(user);
          } else {
            setAppUser(null);
          }
          setAuthInitialized(true);
        });

        return () => unsubscribe();
      }, [auth]);

      // 3. Fetch Data from Firestore (Guarded by user check)
      useEffect(() => {
        if (!appUser || !db) return;
        const { collection, onSnapshot } = window.FirebaseHelper;
        
        const q = collection(db, 'artifacts', appId, 'users', appUser.uid, 'requests');
        const unsubscribe = onSnapshot(q, (snapshot) => {
          const loaded = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setRequests(loaded.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)));
        }, (error) => {
          console.error("Error fetching requests:", error);
        });

        return () => unsubscribe();
      }, [appUser, db, appId]);

      // Refresh Icons
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [view, currentStep, selectedRequest, activeOutputTab, appUser]);

      // === AUTHENTICATION HANDLERS ===
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        const { createUserWithEmailAndPassword, signInWithEmailAndPassword, doc, setDoc } = window.FirebaseHelper;
        
        try {
          if (authMode === 'register') {
            const userCred = await createUserWithEmailAndPassword(auth, authEmail, authPassword);
            // Track total users for the creator by saving a public profile
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'userProfiles', userCred.user.uid);
            await setDoc(userRef, { email: authEmail, createdAt: new Date().toISOString() });
          } else {
            await signInWithEmailAndPassword(auth, authEmail, authPassword);
          }
        } catch (error) {
          setAuthError(error.message.replace('Firebase: ', ''));
        }
        setAuthLoading(false);
      };

      const handleLogout = () => {
        const { signOut } = window.FirebaseHelper;
        signOut(auth);
      };

      // === INTERVIEW LOGIC ===
      const resetForm = () => {
        setFormData({
          tenantName: '', rentalAddress: '', apartmentNum: '', city: '',
          landlordName: '', repairType: '', repairDescription: '', dateBegan: new Date().toISOString().split('T')[0],
          notifiedBefore: 'no', urgency: 'normal', children: 'no',
          photosData: [] // Stores base64 images
        });
      };

      const handleStartNewRequest = () => {
        resetForm();
        setCurrentStep(1);
        setView('interview');
      };

      const handleInputChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
      };

      const steps = [
        { id: 1, title: { en: 'Profile & Location', es: 'Perfil y ubicación' } },
        { id: 2, title: { en: 'Select Repair Issue', es: 'Seleccionar problema' } },
        { id: 3, title: { en: 'Repair Details', es: 'Detalles de la reparación' } },
        { id: 4, title: { en: 'Landlord Info', es: 'Propietario' } },
        { id: 5, title: { en: 'Urgency', es: 'Urgencia' } },
        { id: 6, title: { en: 'Evidence & Photo Upload', es: 'Evidencia y Fotos' } }
      ];

      const handleNextStep = () => {
        if (currentStep < steps.length) {
          setCurrentStep(currentStep + 1);
        } else {
          generateRequestPacket();
        }
      };

      const handlePrevStep = () => {
        if (currentStep > 1) {
          setCurrentStep(currentStep - 1);
        }
      };

      // Handle Image Resizing to bypass Firestore 1MB limits
      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 600; // Resize width
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scaleSize;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const base64String = canvas.toDataURL('image/jpeg', 0.6); // Compress quality
            
            setFormData(prev => ({
              ...prev,
              photosData: [...(prev.photosData || []), base64String]
            }));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const removePhoto = (index) => {
        setFormData(prev => {
          const newPhotos = [...prev.photosData];
          newPhotos.splice(index, 1);
          return { ...prev, photosData: newPhotos };
        });
      };

      const generateLocalTexts = (data, lang) => {
        const issueObj = REPAIR_TYPES.find(r => r.id === data.repairType);
        const issueLabel = issueObj ? issueObj.label[lang] : data.repairType;
        
        // Automatically default to a highly professional tone
        const salutation = lang === 'en' ? `Dear ${data.landlordName || 'Landlord'},` : `Estimado ${data.landlordName || 'Propietario'},`;
        const opening = lang === 'en' 
          ? `I am writing to formally request repairs to my rental unit at ${data.rentalAddress} ${data.apartmentNum ? 'Unit ' + data.apartmentNum : ''}.`
          : `Le escribo para solicitar formalmente reparaciones en mi unidad ubicada en ${data.rentalAddress} ${data.apartmentNum ? 'Apt ' + data.apartmentNum : ''}.`;
        const body = lang === 'en'
          ? `There is an issue regarding: ${issueLabel}.\n\nDetails: ${data.repairDescription}\n\nUnder California Civil Code Section 1941.1, landlords must maintain premises in a tenantable condition.`
          : `Hay un problema de: ${issueLabel}.\n\nDetalles: ${data.repairDescription}\n\nSegún el Código Civil de California 1941.1, los propietarios deben mantener el local en condiciones habitables.`;
        const urgencySection = data.urgency === 'emergency' 
          ? (lang === 'en' ? `As this is an emergency, please address this within 24 hours.` : `Al ser una emergencia, por favor atienda esto en 24 horas.`)
          : (lang === 'en' ? `Please contact me immediately to schedule a repair.` : `Comuníquese conmigo de inmediato para programar la reparación.`);
        const closing = lang === 'en' ? `Sincerely,\n${data.tenantName}` : `Atentamente,\n${data.tenantName}`;

        const letterText = `${new Date().toLocaleDateString(lang === 'en' ? 'en-US' : 'es-ES')}\n\n${salutation}\n\n${opening}\n\n${body}\n\n${urgencySection}\n\n${closing}`;
        const emailText = `Subject: Repair Request - ${issueLabel}\n\n${salutation}\n\n${opening}\n\n${body}\n\n${urgencySection}\n\n${closing}`;
        const smsText = lang === 'en' 
          ? `Hi ${data.landlordName || 'Landlord'}, this is ${data.tenantName} at Apt ${data.apartmentNum}. I'm texting to request urgent repair for ${issueLabel}. Please let me know when a repair person can come.`
          : `Hola ${data.landlordName || 'Propietario'}, soy ${data.tenantName} del Apt ${data.apartmentNum}. Escribo para solicitar reparación de ${issueLabel}. Avíseme cuándo puede venir alguien.`;

        return { letterText, emailText, smsText };
      };

      const generateRequestPacket = async () => {
        setLoading(true);
        setView('result');

        const fallback = generateLocalTexts(formData, language);
        
        const newRequest = {
          id: 'req-' + Date.now(),
          ...formData,
          status: 'Submitted',
          createdAt: new Date().toISOString(),
          letterText: fallback.letterText,
          emailText: fallback.emailText,
          smsText: fallback.smsText
        };

        const { doc, setDoc } = window.FirebaseHelper;
        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', appUser.uid, 'requests', newRequest.id), newRequest);
          setSelectedRequest(newRequest);
        } catch (error) {
          console.error("Error saving request to Firestore:", error);
          alert("Could not save to cloud storage, but document was generated.");
        }
        
        setLoading(false);
      };

      const handleDeleteRequest = async (id, e) => {
        e.stopPropagation();
        const { doc, deleteDoc } = window.FirebaseHelper;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', appUser.uid, 'requests', id));
          if (selectedRequest?.id === id) setSelectedRequest(null);
        } catch (error) {
          console.error("Error deleting request:", error);
        }
      };

      const copyToClipboard = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); alert('Copied to clipboard!'); } catch (err) {}
        document.body.removeChild(textArea);
      };

      // Wait until Firebase checks auth state
      if (!authInitialized) {
        return <div className="min-h-screen flex items-center justify-center text-teal-600 font-bold">Connecting securely...</div>;
      }

      // === RENDER LOGIN/SIGNUP UI ===
      if (!appUser) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
            <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
              <div className="inline-flex p-3 bg-gradient-to-tr from-teal-600 to-emerald-500 rounded-2xl text-white shadow-md mx-auto">
                <ShieldAlert />
              </div>
              <h2 className="mt-4 text-3xl font-extrabold text-slate-900">LawLens</h2>
              <p className="mt-2 text-sm text-slate-600">Secure Renter Account Portal</p>
            </div>

            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
              <div className="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-slate-200">
                <form className="space-y-6" onSubmit={handleAuthSubmit}>
                  {authError && (
                    <div className="p-3 bg-rose-50 text-rose-700 text-sm rounded-lg font-medium">
                      {authError}
                    </div>
                  )}
                  <div>
                    <label className="block text-sm font-medium text-slate-700">Email address</label>
                    <input type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} className="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 focus:bg-white text-slate-800 font-medium transition" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700">Password</label>
                    <input type="password" required value={authPassword} onChange={e => setAuthPassword(e.target.value)} className="mt-1 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 focus:bg-white text-slate-800 font-medium transition" />
                  </div>
                  <button type="submit" disabled={authLoading} className="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 transition">
                    {authLoading ? 'Processing...' : (authMode === 'login' ? 'Sign In to Account' : 'Create Free Account')}
                  </button>
                </form>
                <div className="mt-6 text-center">
                  <button onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} className="text-teal-600 font-bold text-sm hover:text-teal-500 transition">
                    {authMode === 'login' ? 'Need an account? Sign up' : 'Already have an account? Sign in'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // === RENDER MAIN APP ===
      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased">
          
          <header className="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm backdrop-blur-md bg-white/95">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('dashboard')}>
                <div className="p-2 bg-gradient-to-tr from-teal-600 to-emerald-500 rounded-xl text-white shadow-md">
                  <ShieldAlert />
                </div>
                <h1 className="text-xl font-black tracking-tight text-slate-800 flex items-center gap-1">
                  Law<span className="text-teal-600">Lens</span>
                </h1>
              </div>

              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                  <Languages />
                  <select value={language} onChange={(e) => setLanguage(e.target.value)} className="bg-transparent text-sm font-semibold text-slate-700 focus:outline-none cursor-pointer pr-1">
                    {LANGUAGES.map(lang => (<option key={lang.code} value={lang.code}>{lang.label}</option>))}
                  </select>
                </div>
                <button onClick={handleLogout} className="flex items-center gap-1 px-3 py-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg text-sm font-bold transition">
                  <LogOut /> Exit
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="mb-6 p-3 bg-teal-50 border border-teal-200 rounded-xl flex items-start gap-3">
              <Info />
              <p className="text-xs text-teal-900 leading-relaxed">
                <strong>Your Safe Portal:</strong> This account helps you safely store your repair requests and track communications. Always take clear photos of your housing issues!
              </p>
            </div>

            {/* DASHBOARD VIEW */}
            {view === 'dashboard' && (
              <div className="space-y-8 animate-fadeIn">
                <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-teal-950 rounded-2xl p-6 sm:p-8 text-white shadow-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                  <div className="space-y-2 max-w-xl">
                    <div className="inline-flex items-center gap-1 px-3 py-1 bg-teal-500/20 border border-teal-500/30 rounded-full text-teal-300 text-xs font-bold">
                      <Sparkles /> Smart Tenant Toolkit
                    </div>
                    <h2 className="text-2xl sm:text-3.5xl font-extrabold tracking-tight">Protect Your Home. Enforce Your Rights.</h2>
                  </div>
                  <button onClick={handleStartNewRequest} className="shrink-0 flex items-center gap-2 px-6 py-4 bg-teal-500 hover:bg-teal-400 text-slate-900 font-extrabold text-lg rounded-2xl shadow-lg transition transform active:scale-95">
                    <Plus /> New Request
                  </button>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  
                  {/* History Column */}
                  <div className="lg:col-span-1 space-y-4">
                    <h3 className="font-bold text-slate-700 text-lg border-b border-slate-200 pb-2">Your Saved Documents</h3>
                    <div className="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                      {requests.length === 0 ? (
                        <p className="text-sm text-slate-500 text-center py-6 bg-white rounded-xl border border-dashed border-slate-300">No requests saved yet. Click "New Request" to begin.</p>
                      ) : requests.map(req => {
                        const iconObj = REPAIR_TYPES.find(r => r.id === req.repairType);
                        return (
                          <div key={req.id} onClick={() => setSelectedRequest(req)} className={`p-4 rounded-xl border transition cursor-pointer flex justify-between items-start ${selectedRequest?.id === req.id ? 'bg-teal-50/50 border-teal-500 shadow-sm' : 'bg-white border-slate-200 hover:border-slate-300 hover:shadow-sm'}`}>
                            <div className="flex items-center gap-3">
                              <span className="text-2xl">{iconObj?.icon || '🛠️'}</span>
                              <div>
                                <h4 className="font-bold text-slate-800 text-sm">{iconObj?.label[language] || req.repairType}</h4>
                                <p className="text-xs text-slate-500">{new Date(req.createdAt).toLocaleDateString()}</p>
                              </div>
                            </div>
                            <button onClick={(e) => handleDeleteRequest(req.id, e)} className="p-1.5 hover:bg-rose-50 text-slate-400 hover:text-rose-600 rounded-lg transition"><Trash2 /></button>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Document View Column */}
                  <div className="lg:col-span-2">
                    {selectedRequest ? (
                      <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 space-y-6">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-100 pb-4">
                          <h3 className="text-xl font-bold text-slate-800">
                            {REPAIR_TYPES.find(r => r.id === selectedRequest.repairType)?.label[language] || selectedRequest.repairType} Request
                          </h3>
                          <button onClick={() => window.print()} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition">
                            <Printer /> Print
                          </button>
                        </div>

                        {/* Display uploaded photos if any exist in the record */}
                        {selectedRequest.photosData && selectedRequest.photosData.length > 0 && (
                          <div className="p-4 bg-slate-50 rounded-xl border border-slate-200">
                            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Attached Evidence Photos</h4>
                            <div className="flex gap-3 overflow-x-auto pb-2">
                              {selectedRequest.photosData.map((b64, idx) => (
                                <img key={idx} src={b64} alt="Evidence" className="h-24 w-24 object-cover rounded-lg border border-slate-300 shadow-sm" />
                              ))}
                            </div>
                          </div>
                        )}

                        <div>
                          <div className="flex border-b border-slate-200">
                            <button onClick={() => setActiveOutputTab('letter')} className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'letter' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}>
                              <FileText className="w-4 h-4" /> Formal Letter
                            </button>
                            <button onClick={() => setActiveOutputTab('email')} className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'email' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}>
                              <Mail /> Email Draft
                            </button>
                            <button onClick={() => setActiveOutputTab('sms')} className={`flex items-center gap-2 px-4 py-2.5 font-bold text-sm border-b-2 transition -mb-[2px] ${activeOutputTab === 'sms' ? 'border-teal-600 text-teal-700' : 'border-transparent text-slate-500'}`}>
                              <MessageSquare /> SMS Text
                            </button>
                          </div>
                          <div className="mt-4 p-5 bg-slate-50 border border-slate-200 rounded-xl relative">
                            <button onClick={() => copyToClipboard(activeOutputTab === 'letter' ? selectedRequest.letterText : activeOutputTab === 'email' ? selectedRequest.emailText : selectedRequest.smsText)} className="absolute top-3 right-3 p-2 bg-white hover:bg-slate-100 text-slate-500 rounded-lg border border-slate-200 shadow-sm transition flex items-center gap-1 text-xs">
                              <Copy /> Copy Text
                            </button>
                            <pre className="whitespace-pre-wrap font-sans text-sm text-slate-700 leading-relaxed max-h-[400px] overflow-y-auto">
                              {activeOutputTab === 'letter' && selectedRequest.letterText}
                              {activeOutputTab === 'email' && selectedRequest.emailText}
                              {activeOutputTab === 'sms' && selectedRequest.smsText}
                            </pre>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="bg-slate-100/50 border-2 border-dashed border-slate-300 rounded-2xl p-12 text-center space-y-4">
                        <FileText className="w-12 h-12 text-slate-400 mx-auto" />
                        <h4 className="font-bold text-slate-700">Select a request from your history to view it.</h4>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* INTERVIEW WIZARD VIEW */}
            {view === 'interview' && (
              <div className="max-w-3xl mx-auto bg-white border border-slate-200 rounded-3xl shadow-xl overflow-hidden animate-fadeIn">
                <div className="bg-gradient-to-r from-slate-900 to-slate-800 px-6 sm:px-8 py-5 text-white flex justify-between items-center">
                  <div>
                    <span className="text-xs uppercase tracking-widest text-teal-400 font-bold">Step {currentStep} of {steps.length}</span>
                    <h3 className="text-lg font-bold">{steps[currentStep-1].title[language]}</h3>
                  </div>
                  <button onClick={() => setView('dashboard')} className="text-slate-400 hover:text-white text-xs font-semibold">Cancel</button>
                </div>
                <div className="w-full h-1.5 bg-slate-100">
                  <div className="h-full bg-teal-500 transition-all duration-300" style={{ width: `${(currentStep / steps.length) * 100}%` }}></div>
                </div>

                <div className="p-6 sm:p-8 space-y-6">
                  {currentStep === 1 && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5"><UserIcon /> Tenant Name</label>
                        <input type="text" value={formData.tenantName} onChange={e => handleInputChange('tenantName', e.target.value)} placeholder="Jane Doe" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5"><HomeIcon /> Street Address</label>
                        <input type="text" value={formData.rentalAddress} onChange={e => handleInputChange('rentalAddress', e.target.value)} placeholder="123 Main St" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" />
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-700">Apt / Unit Number</label>
                        <input type="text" value={formData.apartmentNum} onChange={e => handleInputChange('apartmentNum', e.target.value)} placeholder="Apt 4B" className="mt-1.5 w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" />
                      </div>
                    </div>
                  )}

                  {currentStep === 2 && (
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                      {REPAIR_TYPES.map(repair => (
                        <div key={repair.id} onClick={() => handleInputChange('repairType', repair.id)} className={`p-4 rounded-xl border text-center cursor-pointer transition flex flex-col items-center justify-center gap-2 ${formData.repairType === repair.id ? 'bg-teal-50 border-teal-500 ring-2 ring-teal-500/25' : 'bg-slate-50'}`}>
                          <span className="text-3xl">{repair.icon}</span>
                          <span className="text-xs font-bold">{repair.label[language]}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {currentStep === 3 && (
                    <div className="space-y-4">
                      <label className="text-sm font-bold text-slate-700">Describe the problem exactly as you see it:</label>
                      <textarea rows={4} value={formData.repairDescription} onChange={e => handleInputChange('repairDescription', e.target.value)} placeholder="E.g. The kitchen sink pipe has been leaking heavily..." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl"></textarea>
                    </div>
                  )}

                  {currentStep === 4 && (
                    <div className="space-y-4">
                      <label className="text-sm font-bold text-slate-700">Landlord / Property Manager Name</label>
                      <input type="text" value={formData.landlordName} onChange={e => handleInputChange('landlordName', e.target.value)} placeholder="Jane Management" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl" />
                    </div>
                  )}

                  {currentStep === 5 && (
                    <div className="space-y-4">
                      <label className="text-sm font-bold text-slate-700 block">How urgent is this repair?</label>
                      <div onClick={() => handleInputChange('urgency', 'emergency')} className={`p-4 rounded-xl border cursor-pointer flex items-center gap-3 ${formData.urgency === 'emergency' ? 'bg-rose-50 border-rose-500 ring-2 ring-rose-500/25' : 'bg-slate-50'}`}>
                        <AlertTriangle />
                        <div><p className="text-sm font-bold text-slate-800">Immediate Emergency</p><p className="text-xs text-slate-500">Major leaks, no heat, severe mold.</p></div>
                      </div>
                      <div onClick={() => handleInputChange('urgency', 'normal')} className={`p-4 rounded-xl border cursor-pointer flex items-center gap-3 ${formData.urgency === 'normal' ? 'bg-teal-50 border-teal-500 ring-2 ring-teal-500/25' : 'bg-slate-50'}`}>
                        <Wrench />
                        <div><p className="text-sm font-bold text-slate-800">Normal Priority</p><p className="text-xs text-slate-500">Inconvenient but structurally safe.</p></div>
                      </div>
                    </div>
                  )}

                  {/* UPDATED STEP 6: PHOTO UPLOAD */}
                  {currentStep === 6 && (
                    <div className="space-y-6">
                      <div className="p-5 bg-slate-50 border border-slate-200 rounded-xl space-y-4">
                        <h4 className="font-bold text-slate-800 text-sm">Upload Photographic Evidence</h4>
                        <p className="text-xs text-slate-500 leading-relaxed">Adding photos makes your repair request much stronger. Take clear, well-lit photos of the problem area.</p>
                        
                        {/* Hidden file input */}
                        <input type="file" id="photo-upload" accept="image/*" onChange={handlePhotoUpload} className="hidden" />
                        
                        {/* Custom Upload Button */}
                        <label htmlFor="photo-upload" className="cursor-pointer inline-flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 bg-white border-2 border-dashed border-teal-500 text-teal-700 font-bold rounded-xl hover:bg-teal-50 transition shadow-sm">
                          <Camera /> Add a Photo
                        </label>

                        {/* Photo Preview Gallery */}
                        {formData.photosData && formData.photosData.length > 0 && (
                          <div className="grid grid-cols-3 sm:grid-cols-4 gap-3 pt-4 border-t border-slate-200 mt-4">
                            {formData.photosData.map((b64, index) => (
                              <div key={index} className="relative group aspect-square">
                                <img src={b64} alt={`Uploaded ${index+1}`} className="w-full h-full object-cover rounded-lg border border-slate-300 shadow-sm" />
                                <button onClick={() => removePhoto(index)} className="absolute -top-2 -right-2 bg-rose-500 rounded-full p-1 shadow-md hover:bg-rose-600 transition" title="Remove Photo">
                                  <XCircle />
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-slate-50 border-t border-slate-100 px-6 sm:px-8 py-5 flex justify-between items-center">
                  <button onClick={handlePrevStep} disabled={currentStep === 1} className="flex items-center gap-1 px-4 py-2 text-sm font-bold rounded-xl text-slate-600 hover:bg-slate-200 disabled:opacity-30 disabled:cursor-not-allowed">
                    <ChevronLeft /> Back
                  </button>
                  <button onClick={handleNextStep} className="flex items-center gap-1 px-6 py-3 bg-teal-600 hover:bg-teal-500 text-white font-bold text-sm rounded-xl shadow-md transition">
                    {currentStep === steps.length ? 'Save & Generate' : 'Next Step'} <ChevronRight />
                  </button>
                </div>
              </div>
            )}
            
            {view === 'result' && loading && (
              <div className="text-center py-20"><h3 className="text-xl font-bold text-slate-800">Saving securely...</h3></div>
            )}
          </main>
        </div>
      );
    }

    // Mount App once we detect FirebaseHelper is ready
    const mountInterval = setInterval(() => {
      if (window.FirebaseHelper) {
        clearInterval(mountInterval);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      }
    }, 50);
  </script>
</body>
</html>
